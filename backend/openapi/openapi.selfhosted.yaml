openapi: 3.0.3
info:
  title: SlugBase API (self-hosted)
  description: |
    HTTP API for a self-hosted SlugBase instance. Replace the server URL with your deployment base URL.

    **Authentication:** Most routes accept either a session cookie (browser) after login, or `Authorization: Bearer <api_token>` from `/api/tokens`. Personal API tokens do **not** require interactive MFA when a user has TOTP enabled (same model as GitHub PATs: possession of the secret is the factor).

    **MFA (TOTP):** Optional second factor after password or OIDC. Step-up uses a short-lived `slugbase.mfa_pending` cookie until `POST /api/auth/mfa/verify` succeeds. Management routes require a normal session plus CSRF where applicable.

    **CSRF:** For cookie-based sessions, non-GET requests generally require `X-CSRF-Token` from `GET /api/csrf-token` first. Some auth and password-reset routes are exempt (see code: `app-factory.ts`).
  version: 1.0.0
servers:
  - url: /
    description: Instance root (e.g. https://bookmarks.example.com)
tags:
  - name: CSRFHealth
  - name: Auth
  - name: MFA
  - name: PasswordReset
  - name: EmailVerification
  - name: Bookmarks
  - name: Folders
  - name: Tags
  - name: Users
  - name: Teams
  - name: Tokens
  - name: Config
  - name: OIDCProviders
  - name: AdminUsers
  - name: AdminTeams
  - name: AdminSettings
  - name: AdminStats
  - name: AdminAuditLog
  - name: Dashboard
  - name: GoPreferences
paths:
  /api/csrf-token:
    get:
      tags: [CSRFHealth]
      summary: Get CSRF token
      security: []
      responses:
        '200':
          description: Token for X-CSRF-Token header
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrfToken:
                    type: string
        '500':
          $ref: '#/components/responses/Error'
  /api/health:
    get:
      tags: [CSRFHealth]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/version:
    get:
      tags: [CSRFHealth]
      summary: App version and mode
      security: []
      responses:
        '200':
          description: Version metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  commit: { type: string, nullable: true }
                  mode: { type: string }
  /api/auth/providers:
    get:
      tags: [Auth]
      summary: List OIDC provider metadata
      security: []
      responses:
        '200':
          description: Providers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current session user
      description: Requires a valid access JWT (not the MFA pending cookie alone). Includes `mfa_enabled` when the user row is loaded.
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Email/password login
      description: |
        On correct password, normally returns the user object and sets the access JWT cookie.
        If the account has MFA enabled, returns `{ "mfa_required": true }` (HTTP 200) and sets the `slugbase.mfa_pending` cookie instead of issuing an access JWT until `POST /api/auth/mfa/verify` succeeds.
        Failed credentials always return **401** (no `mfa_required`) to avoid account enumeration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Logged in, or MFA step-up required (see schema)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthLoginSuccess'
                  - $ref: '#/components/schemas/AuthLoginMfaRequired'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          description: Hosted/cloud deployments may return this when email is not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorWithCode'
  /api/auth/mfa/status:
    get:
      tags: [MFA]
      summary: MFA enrollment status
      description: Whether TOTP MFA is enabled and when it was enrolled. No secrets.
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/mfa/enroll/begin:
    post:
      tags: [MFA]
      summary: Start MFA enrollment
      description: |
        Generates a TOTP secret, persists it encrypted with `mfa_enabled` still false, and returns `otpauth_url` plus Base32 `secret` for manual entry.
        The SPA should render a QR code from `otpauth_url` locally. **409** if MFA is already fully enabled.
      responses:
        '200':
          description: Enrollment data (persisted pending confirm)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaEnrollBeginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: MFA already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
        '429':
          description: Rate limited
  /api/auth/mfa/enroll/confirm:
    post:
      tags: [MFA]
      summary: Confirm MFA enrollment
      description: Verifies a 6-digit TOTP code against the pending secret, enables MFA, and returns one-time backup codes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: 6-digit TOTP from the authenticator app
      responses:
        '200':
          description: MFA enabled; backup codes returned once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaBackupCodesResponse'
        '400':
          description: Invalid code or no enrollment in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: MFA already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
  /api/auth/mfa/enroll/cancel:
    post:
      tags: [MFA]
      summary: Cancel MFA enrollment
      description: |
        Clears a pending (not yet confirmed) TOTP secret. Idempotent **200** if there is nothing to clear.
        **409** if MFA is already fully enabled.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: MFA already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
  /api/auth/mfa/disable:
    post:
      tags: [MFA]
      summary: Disable MFA
      description: |
        Requires a valid TOTP or unused backup code. Local (password) users must also send `password`.
        OIDC-only users omit `password`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaDisableRequest'
      responses:
        '200':
          description: MFA disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '400':
          description: Validation or wrong code (`code` may be `MFA_NOT_ENABLED`, `PASSWORD_REQUIRED`, `INVALID_CODE`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
        '401':
          description: Invalid password (`INVALID_PASSWORD`) or unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
  /api/auth/mfa/backup/regenerate:
    post:
      tags: [MFA]
      summary: Regenerate backup codes
      description: Same trust bar as disable — invalidates all previous backup codes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaDisableRequest'
      responses:
        '200':
          description: New backup codes (plaintext once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaBackupCodesResponse'
        '400':
          description: Validation or wrong code (`code` may be `MFA_NOT_ENABLED`, `PASSWORD_REQUIRED`, `INVALID_CODE`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
        '401':
          description: Invalid password (`INVALID_PASSWORD`) or unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
  /api/auth/mfa/verify:
    post:
      tags: [MFA]
      summary: Complete MFA step-up after login
      description: |
        Uses the `slugbase.mfa_pending` cookie from password login or OIDC redirect (not the access JWT).
        On success, clears the pending cookie and sets the access JWT. Strict rate limiting applies.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: 6-digit TOTP or a 16-character lowercase hex backup code
      responses:
        '200':
          description: Logged in (access cookie set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginSuccess'
        '400':
          description: Missing body fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
        '401':
          description: Invalid or expired pending session, or invalid code (`MFA_PENDING_INVALID`, `INVALID_CODE`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaErrorResponse'
        '403':
          description: Cloud only — email not verified after MFA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorWithCode'
        '429':
          description: Rate limited
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      responses:
        '200':
          description: Logged out
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register (may be disabled on self-hosted)
      description: Often returns 404 when registration is disabled; first user uses Setup instead.
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
        '404':
          description: Registration disabled
  /api/auth/verify-signup:
    post:
      tags: [Auth]
      summary: Verify signup token
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /api/auth/signup-verification/status:
    get:
      tags: [Auth]
      summary: Signup verification status
      security: []
      parameters:
        - in: query
          name: email
          schema:
            type: string
      responses:
        '200':
          description: Status
  /api/auth/resend-signup-verification:
    post:
      tags: [Auth]
      summary: Resend signup verification
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /api/auth/request-signup-resend:
    post:
      tags: [Auth]
      summary: Request signup resend (rate-limited)
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT/session
      security: []
      responses:
        '200':
          description: OK
  /api/auth/{provider}:
    get:
      tags: [Auth]
      summary: Start OIDC login
      security: []
      parameters:
        - $ref: '#/components/parameters/ProviderKey'
      responses:
        '302':
          description: Redirect to IdP
  /api/auth/{provider}/callback:
    get:
      tags: [Auth]
      summary: OIDC callback
      security: []
      parameters:
        - $ref: '#/components/parameters/ProviderKey'
      responses:
        '302':
          description: Redirect to app
  /api/auth/setup:
    post:
      tags: [Auth]
      summary: First-run setup (create admin)
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/Error'
  /api/auth/setup/status:
    get:
      tags: [Auth]
      summary: Whether initial setup is complete
      security: []
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized:
                    type: boolean
  /api/password-reset/request:
    post:
      tags: [PasswordReset]
      summary: Request password reset email
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: OK
  /api/password-reset/verify:
    get:
      tags: [PasswordReset]
      summary: Validate reset token (query params)
      security: []
      responses:
        '200':
          description: OK
  /api/password-reset/reset:
    post:
      tags: [PasswordReset]
      summary: Complete password reset
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /api/email-verification/verify:
    get:
      tags: [EmailVerification]
      summary: Email verification landing (query token)
      security: []
      responses:
        '200':
          description: OK
  /api/email-verification/confirm:
    post:
      tags: [EmailVerification]
      summary: Confirm email verification
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /api/bookmarks:
    get:
      tags: [Bookmarks]
      summary: List bookmarks
      responses:
        '200':
          description: Bookmarks
    post:
      tags: [Bookmarks]
      summary: Create bookmark
      responses:
        '201':
          description: Created
  /api/bookmarks/search:
    get:
      tags: [Bookmarks]
      summary: Search bookmarks
      parameters:
        - in: query
          name: q
          schema:
            type: string
      responses:
        '200':
          description: Results
  /api/bookmarks/export:
    get:
      tags: [Bookmarks]
      summary: Export bookmarks
      responses:
        '200':
          description: Export payload
  /api/bookmarks/ids:
    get:
      tags: [Bookmarks]
      summary: List bookmark IDs
      responses:
        '200':
          description: IDs
  /api/bookmarks/ai-suggest:
    post:
      tags: [Bookmarks]
      summary: AI metadata suggestions
      responses:
        '200':
          description: Suggestions
  /api/bookmarks/import:
    post:
      tags: [Bookmarks]
      summary: Import bookmarks
      responses:
        '200':
          description: Import result
  /api/bookmarks/{id}:
    get:
      tags: [Bookmarks]
      summary: Get bookmark
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Bookmark
        '404':
          $ref: '#/components/responses/Error'
    put:
      tags: [Bookmarks]
      summary: Update bookmark
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Bookmarks]
      summary: Delete bookmark
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
  /api/bookmarks/{id}/track-access:
    post:
      tags: [Bookmarks]
      summary: Track bookmark access
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
  /api/folders:
    get:
      tags: [Folders]
      summary: List folders
      responses:
        '200':
          description: Folders
    post:
      tags: [Folders]
      summary: Create folder
      responses:
        '201':
          description: Created
  /api/folders/{id}:
    get:
      tags: [Folders]
      summary: Get folder
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Folder
    put:
      tags: [Folders]
      summary: Update folder
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Folders]
      summary: Delete folder
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
  /api/tags:
    get:
      tags: [Tags]
      summary: List tags
      responses:
        '200':
          description: Tags
    post:
      tags: [Tags]
      summary: Create tag
      responses:
        '201':
          description: Created
  /api/tags/{id}:
    get:
      tags: [Tags]
      summary: Get tag
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Tag
    put:
      tags: [Tags]
      summary: Update tag
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Tags]
      summary: Delete tag
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
  /api/users/for-sharing:
    get:
      tags: [Users]
      summary: Users available for sharing
      responses:
        '200':
          description: Users
  /api/users/me:
    get:
      tags: [Users]
      summary: Current user profile
      responses:
        '200':
          description: User
    put:
      tags: [Users]
      summary: Update profile
      responses:
        '200':
          description: Updated
    delete:
      tags: [Users]
      summary: Delete own account
      responses:
        '200':
          description: Deleted
  /api/teams:
    get:
      tags: [Teams]
      summary: List teams for current user
      responses:
        '200':
          description: Teams
  /api/tokens:
    get:
      tags: [Tokens]
      summary: List API tokens
      responses:
        '200':
          description: Tokens (secrets not listed)
    post:
      tags: [Tokens]
      summary: Create API token
      responses:
        '201':
          description: Token created (secret returned once)
        '429':
          description: Rate limited
  /api/tokens/{id}:
    delete:
      tags: [Tokens]
      summary: Revoke token
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Revoked
  /api/config/plan:
    get:
      tags: [Config]
      summary: Plan / limits for current context
      description: Returns 404 when not running in cloud mode.
      responses:
        '200':
          description: Plan info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigPlanResponse'
  /api/config/ai-suggestions:
    get:
      tags: [Config]
      summary: AI suggestions availability
      responses:
        '200':
          description: Feature flags
  /api/oidc-providers:
    get:
      tags: [OIDCProviders]
      summary: List OIDC providers (admin)
      responses:
        '200':
          description: Providers
    post:
      tags: [OIDCProviders]
      summary: Create OIDC provider (admin)
      responses:
        '201':
          description: Created
  /api/oidc-providers/{id}:
    get:
      tags: [OIDCProviders]
      summary: Get OIDC provider
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Provider
    put:
      tags: [OIDCProviders]
      summary: Update OIDC provider
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Updated
    delete:
      tags: [OIDCProviders]
      summary: Delete OIDC provider
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
  /api/admin/users:
    get:
      tags: [AdminUsers]
      summary: List users
      responses:
        '200':
          description: Users
    post:
      tags: [AdminUsers]
      summary: Create user
      responses:
        '201':
          description: Created
  /api/admin/users/{id}:
    get:
      tags: [AdminUsers]
      summary: Get user
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: User
    put:
      tags: [AdminUsers]
      summary: Update user
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Updated
    delete:
      tags: [AdminUsers]
      summary: Delete user
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
  /api/admin/users/{id}/teams:
    get:
      tags: [AdminUsers]
      summary: Teams for user
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Teams
  /api/admin/teams:
    get:
      tags: [AdminTeams]
      summary: List teams
      responses:
        '200':
          description: Teams
    post:
      tags: [AdminTeams]
      summary: Create team
      responses:
        '201':
          description: Created
  /api/admin/teams/{id}:
    get:
      tags: [AdminTeams]
      summary: Get team
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Team
    put:
      tags: [AdminTeams]
      summary: Update team
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Updated
    delete:
      tags: [AdminTeams]
      summary: Delete team
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
  /api/admin/teams/{id}/members:
    post:
      tags: [AdminTeams]
      summary: Add team member
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
  /api/admin/teams/{id}/members/{userId}:
    delete:
      tags: [AdminTeams]
      summary: Remove team member
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/admin/settings:
    get:
      tags: [AdminSettings]
      summary: List settings keys/metadata
      responses:
        '200':
          description: Settings
    post:
      tags: [AdminSettings]
      summary: Set setting
      responses:
        '200':
          description: OK
  /api/admin/settings/ai:
    get:
      tags: [AdminSettings]
      summary: AI settings
      responses:
        '200':
          description: AI config
    post:
      tags: [AdminSettings]
      summary: Update AI settings
      responses:
        '200':
          description: OK
  /api/admin/settings/smtp:
    get:
      tags: [AdminSettings]
      summary: SMTP settings (sanitized)
      responses:
        '200':
          description: SMTP config
    post:
      tags: [AdminSettings]
      summary: Update SMTP
      responses:
        '200':
          description: OK
  /api/admin/settings/smtp/test:
    post:
      tags: [AdminSettings]
      summary: Test SMTP
      responses:
        '200':
          description: Test result
  /api/admin/settings/ai/models:
    get:
      tags: [AdminSettings]
      summary: List AI models
      responses:
        '200':
          description: Models
  /api/admin/settings/{key}:
    get:
      tags: [AdminSettings]
      summary: Get setting by key
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Value
    delete:
      tags: [AdminSettings]
      summary: Delete setting
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
  /api/admin/audit-log:
    get:
      tags: [AdminAuditLog]
      summary: List audit events for current tenant
      description: Requires admin. On cloud, returns 403 unless the organization is on the Team plan.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: before_created_at
          schema:
            type: string
        - in: query
          name: before_id
          schema:
            type: string
      responses:
        '200':
          description: Audit events page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/stats:
    get:
      tags: [AdminStats]
      summary: System metrics
      description: Requires `X-Stats-Secret` matching `STATS_ENDPOINT_SECRET`. Returns 404 if unset or invalid.
      security: []
      parameters:
        - in: header
          name: X-Stats-Secret
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stats
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Dashboard statistics
      responses:
        '200':
          description: Stats
  /api/go/preferences:
    get:
      tags: [GoPreferences]
      summary: List go-link preferences
      responses:
        '200':
          description: Preferences
    post:
      tags: [GoPreferences]
      summary: Set preference
      responses:
        '200':
          description: OK
  /api/go/preferences/{slug}:
    delete:
      tags: [GoPreferences]
      summary: Remove preference for slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
components:
  schemas:
    AuthLoginMfaRequired:
      type: object
      required: [mfa_required]
      properties:
        mfa_required:
          type: boolean
          enum: [true]
      description: Access JWT is not issued; complete step-up via POST /api/auth/mfa/verify
    AuthLoginSuccess:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        user_key: { type: string }
        is_admin: { type: boolean }
        email_verified: { type: boolean }
        language: { type: string }
        theme: { type: string }
    AuthMeResponse:
      allOf:
        - $ref: '#/components/schemas/AuthLoginSuccess'
        - type: object
          properties:
            ai_suggestions_enabled: { type: boolean }
            mfa_enabled: { type: boolean }
    AuthErrorWithCode:
      type: object
      properties:
        error: { type: string }
        code: { type: string }
    ConfigPlanResponse:
      type: object
      properties:
        plan: { type: string }
        bookmarkLimit: { type: integer, nullable: true }
        canShareWithTeams: { type: boolean }
        ai_available: { type: boolean }
        audit_log_available: { type: boolean }
        email_invites_available: { type: boolean }
    AuditLogEvent:
      type: object
      properties:
        id: { type: string }
        created_at: { type: string }
        action: { type: string }
        entity_type: { type: string }
        entity_id: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
        actor_user_id: { type: string, nullable: true }
        actor_email: { type: string, nullable: true }
        actor_name: { type: string, nullable: true }
    AuditLogListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEvent'
        next_cursor:
          type: object
          nullable: true
          properties:
            before_created_at: { type: string }
            before_id: { type: string }
    MfaStatus:
      type: object
      properties:
        enabled: { type: boolean }
        enrolled_at:
          type: string
          nullable: true
          description: ISO timestamp when MFA was enabled, if applicable
    MfaEnrollBeginResponse:
      type: object
      required: [otpauth_url, secret]
      properties:
        otpauth_url:
          type: string
          description: otpauth URI for QR / authenticator import (do not log in production)
        secret:
          type: string
          description: Base32 secret for manual entry
    MfaBackupCodesResponse:
      type: object
      required: [backup_codes]
      properties:
        backup_codes:
          type: array
          items: { type: string }
          description: One-time codes; shown once
    MfaDisableRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: TOTP or unused backup code
        password:
          type: string
          description: Required when the user has a local password (omit for OIDC-only)
    MfaErrorResponse:
      type: object
      properties:
        error: { type: string }
        code:
          type: string
          description: |
            Stable machine-readable codes include:
            `MFA_ALREADY_ENABLED`, `INVALID_CODE`, `MFA_PENDING_INVALID`, `MFA_NO_PENDING`,
            `MFA_NOT_ENABLED`, `PASSWORD_REQUIRED`, `INVALID_PASSWORD`.
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: slugbase.sid
      description: Session cookie after login
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
    ProviderKey:
      in: path
      name: provider
      required: true
      schema:
        type: string
      description: OIDC provider key
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
security:
  - cookieAuth: []
  - bearerAuth: []
