# SlugBase - Fly.io configuration (shared by staging and prod)
# GitHub Actions deploy:
#   - Staging: fly deploy -a slugbase-staging (dev, staging branches)
#   - Production: fly deploy -a slugbase-prod (main branch)
# The app= below is the default; workflows override via -a.
#
# REQUIRED SECRETS (set via: fly secrets set KEY=value -a slugbase-staging):
#   DATABASE_URL, JWT_SECRET, ENCRYPTION_KEY, SESSION_SECRET, FRONTEND_URL, BASE_URL
# See docs/infra/fly-neon.md for full list and optional (OIDC, SMTP, Featurebase) secrets.
# Optional: FEATUREBASE_APP_ID (runtime; frontend fetches from GET /api/config/public), FEATUREBASE_JWT_SECRET (for logged-in user identification).

app = "slugbase-staging"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_SLUGBASE_MODE = "cloud"
    VITE_API_URL = ""

# Non-sensitive env vars (cloud mode). Sensitive vars must be set via: fly secrets set
[env]
  PORT = "5000"
  NODE_ENV = "production"
  DB_TYPE = "postgresql"
  SLUGBASE_MODE = "cloud"
  JWT_ACCESS_EXPIRES_IN = "15m"
  JWT_REFRESH_EXPIRES_DAYS = "7"
  SMTP_PORT = "587"
  SMTP_SECURE = "false"
  OIDC_MICROSOFT_TENANT = "common"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
