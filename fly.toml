# SlugBase backend - Fly.io configuration
# Default app: slugbase-staging. Use -a slugbase-prod for production deploys.

app = "slugbase-staging"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.backend"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "5s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
