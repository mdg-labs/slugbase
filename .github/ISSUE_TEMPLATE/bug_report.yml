name: "🐛 Bug Report"
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: environment
    attributes:
      label: Environment (Cloud / Self-hosted + Version)
      description: Tell us where this happened.
      placeholder: |
        - Deployment: Cloud or Self-hosted
        - Version: e.g. 0.1.10
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Browser and version (if relevant).
      placeholder: e.g. Chrome 136, Firefox 127
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected / Actual
      description: What did you expect, and what happened instead?
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Drag and drop screenshots if they help explain the issue.
