name: "📖 Documentation Issue"
description: Report incorrect, missing, or unclear docs
title: "[Docs] "
labels: ["documentation"]
body:
  - type: input
    id: doc_url
    attributes:
      label: Doc URL
      description: Link to the affected documentation page.
      placeholder: https://...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Is it wrong, missing, or unclear?
      placeholder: e.g. The setup step is outdated / missing / unclear
    validations:
      required: true
  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix (optional)
      description: Keep it short. A quick suggestion is enough.
      placeholder: Optional: proposed wording or fix idea...
    validations:
      required: false
