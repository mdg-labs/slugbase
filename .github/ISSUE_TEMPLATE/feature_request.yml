name: "✨ Feature Request"
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: "I'm trying to... but..."
      placeholder: |
        I'm trying to ...
        but ...
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: What should happen instead?
      placeholder: Describe your preferred solution...
    validations:
      required: true
  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives Considered
      description: Any workaround or alternative approach you've considered.
      placeholder: Describe any alternatives you've considered...
    validations:
      required: false
  - type: textarea
    id: use_case
    attributes:
      label: Use Case (who benefits?)
      description: Wer profitiert davon? Which users or teams benefit most?
      placeholder: Describe who benefits and in which scenario...
    validations:
      required: true
