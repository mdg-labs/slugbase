# Deploy SlugBase backend to Fly.io (staging)
# Triggers on push to dev or staging branch.
#
# Required secrets: FLY_API_TOKEN, FLY_ORG (org slug when using an organization)

name: Deploy to Fly.io (Staging)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-fly-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to slugbase-staging
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG: ${{ secrets.FLY_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if it doesn't exist
        run: |
          ORG_ARG=""
          [ -n "$FLY_ORG" ] && ORG_ARG="--org $FLY_ORG"
          flyctl apps create slugbase-staging $ORG_ARG --json || true

      - name: Deploy to Fly.io
        run: |
          ORG_ARG=""
          [ -n "$FLY_ORG" ] && ORG_ARG="--org $FLY_ORG"
          flyctl deploy --remote-only -a slugbase-staging $ORG_ARG
