# Deploy SlugBase backend to Fly.io (staging)
# Triggers on push to dev or staging branch.

name: Deploy to Fly.io (Staging)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-fly-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to slugbase-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if it doesn't exist
        run: flyctl apps create slugbase-staging -o json || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only -a slugbase-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
