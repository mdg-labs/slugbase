name: Sync Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: mdg-labs/slugbase-docs
          token: ${{ secrets.GH_TOKEN }}
          path: slugbase-docs
          fetch-depth: 0

      - name: Configure Git
        run: |
          cd slugbase-docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync documentation files
        run: |
          # Sync only selfhosted/, cloud/, and assets/ (docs/internal is never synced)
          mkdir -p slugbase-docs/docs
          rsync -av --delete docs/selfhosted/ slugbase-docs/docs/selfhosted/
          rsync -av --delete docs/cloud/ slugbase-docs/docs/cloud/
          if [ -d "docs/assets" ]; then
            rsync -av --delete docs/assets/ slugbase-docs/docs/assets/
          else
            mkdir -p slugbase-docs/docs/assets
          fi
          echo "Synced:"
          find slugbase-docs/docs -type f | head -50

      - name: Check for changes
        id: check-changes
        run: |
          cd slugbase-docs
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          cd slugbase-docs
          git add docs/
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          # Note: Commit message intentionally does NOT include [skip ci] to ensure docs CI/CD runs
          git commit -m "docs: sync documentation from slugbase repository" -m "Triggered by: $COMMIT_URL" || exit 0
          git push
