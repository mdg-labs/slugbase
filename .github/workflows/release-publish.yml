# Publish slugbase-core to npm on version tags (e.g. v1.0.0).
# Requires NPM_TOKEN secret with publish permission.
name: Publish slugbase-core

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Copy schema into backend dist
        run: cp backend/src/db/schema.sql backend/dist/db/schema.sql

      - name: Prepare slugbase-core package
        run: |
          mkdir -p packages/slugbase-core/dist
          cp -r backend/dist packages/slugbase-core/dist/backend
          cp -r frontend/dist packages/slugbase-core/dist/public
          # Set version from tag (v1.2.3 -> 1.2.3)
          node -e "
            const p = require('./packages/slugbase-core/package.json');
            p.version = (process.env.VERSION || '').replace(/^v/, '');
            require('fs').writeFileSync('./packages/slugbase-core/package.json', JSON.stringify(p, null, 2));
          "
          env:
            VERSION: ${{ github.ref_name }}

      - name: Publish to npm
        run: |
          cd packages/slugbase-core
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
