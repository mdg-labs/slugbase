# Build and deploy SlugBase backend to GCP Cloud Run.
# Uses Workload Identity Federation only (no service account keys).

name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVICE_NAME: slugbase-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional: set environment to "production" in GitHub to use protection rules
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend
        run: |
          npm ci --legacy-peer-deps
          npm run build --workspace=backend

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION || vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION || vars.GCP_REGION }}
          ARTIFACT_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO || 'slugbase-backend' }}
        run: |
          REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}"
          docker build -f Dockerfile.backend \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            -t "$REGISTRY:${{ github.sha }}" \
            -t "$REGISTRY:latest" \
            .
          docker push "$REGISTRY:${{ github.sha }}"
          docker push "$REGISTRY:latest"
          echo "image=$REGISTRY:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        env:
          GCP_REGION: ${{ secrets.GCP_REGION || vars.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ steps.build.outputs.image }} \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT_ID" \
            --platform=managed \
            --allow-unauthenticated
