# Deploy SlugBase backend to Fly.io (production)
# Triggers on push to main. Enable when ready for production.
#
# Required secrets: FLY_API_TOKEN, FLY_ORG (org slug when using an organization)

name: Deploy to Fly.io (Production)

on:
  push:
    #branches:
      #- main
  workflow_dispatch:

concurrency:
  group: deploy-fly-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to slugbase-prod
    runs-on: ubuntu-latest
    # Until prod is ready: only run on manual trigger. When ready, remove the 'if' below.
    if: github.event_name == 'workflow_dispatch'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG: ${{ secrets.FLY_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if it doesn't exist
        run: |
          ORG_ARG=""
          [ -n "$FLY_ORG" ] && ORG_ARG="--org $FLY_ORG"
          flyctl apps create slugbase-prod $ORG_ARG --json || true

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only -a slugbase-prod
