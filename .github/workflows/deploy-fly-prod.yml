# Deploy SlugBase backend to Fly.io (production)
# Triggers on push to main. Enable when ready for production.

name: Deploy to Fly.io (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-fly-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to slugbase-prod
    runs-on: ubuntu-latest
    # Until prod is ready: only run on manual trigger. When ready, remove the 'if' below.
    if: github.event_name == 'workflow_dispatch'
    # Optional: use production environment for approval gates
    # environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only -a slugbase-prod
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
